name: Test

on:
  push:

jobs:
  sqlite:
    runs-on: ubuntu-latest

    env:
      TEST_DATABASES: sqlite3
      SQLITE_FILE: ./knex_clean_test.sqlite

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Test
        run: npm test

  mariadb:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mariadb-version: ['10.6', '10.11', '11.4']

    services:
      mariadb:
        image: mariadb:${{ matrix.mariadb-version }}
        env:
          MYSQL_USER: knex_cleaner
          MYSQL_PASSWORD: password
          MYSQL_DATABASE: knex_cleaner_test
          MYSQL_RANDOM_ROOT_PASSWORD: "1"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      TEST_DATABASES: mysql
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      MYSQL_USER: knex_cleaner
      MYSQL_PASSWORD: password
      MYSQL_DB: knex_cleaner_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Wait for MariaDB
        run: |
          for i in {1..30}; do
            nc -z 127.0.0.1 3306 && break
            sleep 2
          done

      - name: Test
        run: npm test

  postgres:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres-version: ['14', '15', '16', '17']

    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}
        env:
          POSTGRES_DB: knex_cleaner_test
          POSTGRES_USER: knex_cleaner
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U knex_cleaner -d knex_cleaner_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      TEST_DATABASES: postgres
      PG_HOST: 127.0.0.1
      PG_PORT: 5432
      PG_USER: knex_cleaner
      PG_PASSWORD: password
      PG_DB: knex_cleaner_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            nc -z 127.0.0.1 5432 && break
            sleep 2
          done

      - name: Test
        run: npm test
